<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pipeline — zeitra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,480;9..144,560&family=Instrument+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --base:#111119;--navy:#1A1A2E;--raised:#20202e;--raised-2:#272736;
  --gold:#C8962E;--amber:#E2B057;--bronze:#8A6420;
  --cream:#F3EBDA;--body:#C9C2B4;--muted:#948D7F;
  --green:#5aad7f;--red:#d96b5a;
  --line:rgba(243,235,218,.09);--line-gold:rgba(200,150,46,.28);
  --gold-pale:rgba(200,150,46,.07);
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Instrument Sans',-apple-system,sans-serif;
  --font-mono:'Space Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--base);color:var(--body);font-family:var(--font-body);
  font-size:14px;line-height:1.6;min-height:100vh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(200,150,46,.35);color:var(--cream)}

/* AMBIENT — pulled back ~30% on the color stops */
.ambient{position:fixed;inset:0;z-index:-3;background:
  radial-gradient(900px 600px at 72% 10%, rgba(200,150,46,.17), transparent 60%),
  radial-gradient(900px 640px at 8% 38%, rgba(43,49,92,.35), transparent 65%),
  radial-gradient(800px 600px at 88% 80%, rgba(138,100,32,.17), transparent 60%),
  radial-gradient(760px 560px at 22% 102%, rgba(34,38,68,.38), transparent 65%),
  linear-gradient(180deg,#0f0f18 0%, #0e0e17 38%, #0f0f18 70%, #0d0d16 100%);}
.ambient::after{content:"";position:absolute;inset:0;
  background-image:url("https://zeitra.ai/noise.png");background-size:280px;
  opacity:.07;mix-blend-mode:overlay;pointer-events:none}

/* DUST */
#dust{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.7}

/* CIRCUIT — pulled back opacity slightly */
.circuit{position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.26;width:100%;height:100%}
.circuit .pl{stroke:var(--amber);stroke-width:2.8;stroke-opacity:1;
  stroke-dasharray:150 1800;stroke-dashoffset:2480;
  animation:pulseTravel var(--dur,10s) linear var(--del,0s) infinite;
  filter:drop-shadow(0 0 16px rgba(226,176,87,1))}
@keyframes pulseTravel{to{stroke-dashoffset:0}}
.circuit-nodes{position:fixed;inset:0;z-index:-1;pointer-events:none;width:100%;height:100%}
.circuit-nodes .cnode{fill:rgba(226,176,87,1);opacity:0;
  transform-box:fill-box;transform-origin:center;
  filter:drop-shadow(0 0 16px rgba(226,176,87,1));
  animation:nodeBreath 4.5s ease-in-out var(--cdel,0s) infinite;
  animation-fill-mode:both}
@keyframes nodeBreath{
  0%,100%{opacity:0;transform:scale(.55)}
  12%{opacity:.6;transform:scale(.9)}
  22%{opacity:.9;transform:scale(1.35)}
  42%,99%{opacity:0;transform:scale(.55)}}

/* VEIL */
.veil{position:fixed;inset:0;z-index:200;pointer-events:none;
  background:linear-gradient(120deg,#14141f,#1A1A2E);
  transform:translateY(0);animation:veilOut .62s var(--ease) .12s forwards}
.veil::before{content:"";position:absolute;top:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  filter:drop-shadow(0 0 8px rgba(200,150,46,.6))}
.veil::after{content:"";position:absolute;bottom:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  filter:drop-shadow(0 0 8px rgba(200,150,46,.6))}
@keyframes veilOut{from{transform:translateY(0)}to{transform:translateY(-101%)}}

/* SHELL */
.shell{max-width:740px;margin:0 auto;padding:52px 24px 72px}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:48px;padding-bottom:22px;border-bottom:1px solid var(--line)}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-area img{height:30px;width:auto;opacity:.92}
.divider-v{width:1px;height:20px;background:var(--line-gold)}
.page-title{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;
  text-transform:uppercase;color:var(--gold)}
.status-pill{display:flex;align-items:center;gap:8px;background:var(--gold-pale);
  border:1px solid var(--line-gold);border-radius:100px;padding:6px 14px;
  font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
.dot.live{background:var(--green);box-shadow:0 0 8px rgba(90,173,127,.6)}
.dot.loading{background:var(--amber);animation:blink 1s ease-in-out infinite}
.dot.error{background:var(--red);box-shadow:0 0 6px rgba(217,107,90,.5)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* SECTION LABELS */
.section-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.32em;
  text-transform:uppercase;color:var(--gold);margin-bottom:16px;
  display:flex;align-items:center;gap:14px}
.section-label::before{content:'';width:20px;height:1px;background:var(--gold);flex:none}
.section-label::after{content:'';flex:1;height:1px;background:var(--line-gold)}

/* SENT TODAY */
.sent-today-block{background:linear-gradient(160deg,rgba(200,150,46,.12),rgba(26,26,46,.6));
  border:1px solid var(--line-gold);border-radius:14px;padding:20px 24px;
  margin-bottom:32px;display:flex;align-items:center;
  justify-content:space-between;gap:20px;position:relative;overflow:hidden}
.sent-today-block::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,150,46,.5),transparent)}
.sent-today-left{display:flex;align-items:baseline;gap:12px}
.sent-today-number{font-family:var(--font-display);font-size:52px;font-weight:480;
  line-height:1;letter-spacing:-.02em;color:var(--gold);
  font-variation-settings:"opsz" 72;transition:opacity .2s}
.sent-today-number.loading{opacity:.15}
.sent-today-meta b{display:block;font-family:var(--font-display);font-size:1rem;
  font-weight:480;color:var(--cream);line-height:1.2;font-variation-settings:"opsz" 72}
.sent-today-meta span{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted)}
.sent-today-right{text-align:right}
.sent-today-date{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--bronze);display:block;margin-bottom:4px}
.sent-breakdown{font-size:12px;color:var(--muted)}
.sent-breakdown span{color:var(--amber)}

/* ENRICHED GRID */
.enriched-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.metric-card{background:linear-gradient(160deg,rgba(39,39,54,.6),rgba(26,26,46,.45));
  border:1px solid var(--line);border-radius:14px;padding:18px 20px 16px;
  position:relative;overflow:hidden;
  transition:border-color .3s var(--ease),transform .3s var(--ease)}
.metric-card:hover{border-color:var(--line-gold);transform:translateY(-2px)}
.metric-card.primary{background:linear-gradient(160deg,rgba(200,150,46,.13),rgba(26,26,46,.55));
  border-color:rgba(200,150,46,.3)}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--line-gold),transparent)}
.metric-card.primary::before{background:linear-gradient(90deg,transparent,rgba(200,150,46,.5),transparent)}
.metric-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.metric-number{font-family:var(--font-display);font-size:38px;font-weight:480;
  line-height:1;letter-spacing:-.02em;color:var(--cream);
  font-variation-settings:"opsz" 72;transition:opacity .2s}
.metric-card.primary .metric-number{font-size:48px;color:var(--gold)}
.metric-number.loading{opacity:.15}
.metric-pct{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.06em}

/* BAR */
.bar-block{background:linear-gradient(160deg,rgba(39,39,54,.55),rgba(26,26,46,.4));
  border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:40px}
.bar-row{display:flex;align-items:center;gap:14px;margin-bottom:13px}
.bar-row:last-child{margin-bottom:0}
.bar-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);width:88px;flex-shrink:0}
.bar-track{flex:1;height:2px;background:rgba(243,235,218,.06);border-radius:1px;overflow:hidden}
.bar-fill{height:100%;border-radius:1px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.bar-fill.f1{background:linear-gradient(90deg,var(--bronze),var(--gold))}
.bar-fill.f2{background:linear-gradient(90deg,var(--bronze),var(--gold));opacity:.65}
.bar-fill.f3{background:linear-gradient(90deg,var(--bronze),var(--gold));opacity:.35}
.bar-count{font-family:var(--font-mono);font-size:11px;color:var(--amber);width:28px;text-align:right;flex-shrink:0}

/* UNENRICHED */
.unenriched-block{background:linear-gradient(160deg,rgba(39,39,54,.6),rgba(26,26,46,.45));
  border:1px solid var(--line);border-radius:18px;overflow:hidden;
  margin-bottom:40px;transition:border-color .3s var(--ease)}
.unenriched-block:hover{border-color:var(--line-gold)}
.unenriched-hero{padding:24px 24px 18px;display:flex;align-items:baseline;gap:14px;
  border-bottom:1px solid var(--line);position:relative}
.unenriched-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--line-gold),transparent)}
.unenriched-number{font-family:var(--font-display);font-size:62px;font-weight:480;
  letter-spacing:-.02em;line-height:1;color:var(--cream);
  font-variation-settings:"opsz" 72;transition:opacity .2s}
.unenriched-number.loading{opacity:.15}
.unenriched-sublabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);padding-bottom:4px}
.source-row{display:grid;grid-template-columns:repeat(3,1fr)}
.source-cell{padding:18px 22px;border-right:1px solid var(--line);transition:background .25s}
.source-cell:hover{background:var(--gold-pale)}
.source-cell:last-child{border-right:none}
.source-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--bronze);margin-bottom:8px}
.source-number{font-family:var(--font-display);font-size:30px;font-weight:480;
  color:var(--cream);font-variation-settings:"opsz" 72;transition:opacity .2s}
.source-number.loading{opacity:.15}

/* FOOTER */
footer{display:flex;justify-content:space-between;align-items:center;gap:16px;
  flex-wrap:wrap;padding-top:22px;border-top:1px solid var(--line)}
.updated{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--muted)}
.countdown{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--muted);opacity:.6}
.refresh-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);background:rgba(200,150,46,.06);border:1px solid var(--line-gold);
  border-radius:100px;padding:7px 18px;cursor:pointer;
  transition:background .2s var(--ease),border-color .2s var(--ease),transform .2s var(--ease);
  position:relative;overflow:hidden}
.refresh-btn::after{content:'';position:absolute;top:0;left:-70%;width:45%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(200,150,46,.25),transparent);
  transform:skewX(-20deg);transition:left .55s ease}
.refresh-btn:hover{background:rgba(200,150,46,.13);border-color:rgba(200,150,46,.5);transform:translateY(-1px)}
.refresh-btn:hover::after{left:130%}

/* RESPONSIVE */
@media(max-width:580px){
  .enriched-grid{grid-template-columns:1fr 1fr}
  .metric-card.primary{grid-column:1/-1}
  .shell{padding:32px 16px 56px}
  .sent-today-block{flex-direction:column;gap:14px}
  .sent-today-right{text-align:left}
  footer{flex-direction:column;align-items:flex-start;gap:10px}
}

/* REVEALS */
.rv{opacity:0;transform:translateY(22px)}
.no-js .rv{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){
  .veil{display:none!important}
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .rv{opacity:1!important;transform:none!important}
}
</style>
</head>

<div class="shell">

  <header>
    <div class="logo-area">
      <img src="https://zeitra.ai/logo.png" alt="Zeitra">
      <div class="divider-v"></div>

    <div class="metric-card">

  <div class="bar-block rv" data-d=".13">

    <div class="unenriched-hero">
      <div class="unenriched-number loading" id="u-total">—</div>
      <div class="unenriched-sublabel">ready to enrich</div>

    <div class="source-row">

        <div class="source-label">ad leads</div>

        <div class="source-label">linkedin</div>

<script>
(function(){
  document.documentElement.classList.remove('no-js');
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced) document.documentElement.classList.add('reduced');

  var canvas = document.getElementById('dust');
  if(canvas && !reduced){
    var ctx = canvas.getContext('2d'), pts = [], W, H;
    function size(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    size(); addEventListener('resize', size);
    var N = innerWidth < 700 ? 38 : 70;
    for(var i=0;i<N;i++) pts.push({
      x:  Math.random()*innerWidth,  y:  Math.random()*innerHeight,
      vx: (Math.random()-.5)*.15,    vy: (Math.random()-.5)*.15,
      r:  Math.random()*2+.6,        a:  Math.random()*.13+.06
    });
    (function tick(){
      ctx.clearRect(0,0,W,H);
      for(var i=0;i<pts.length;i++){
        var p=pts[i];
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<-10)p.x=W+10; if(p.x>W+10)p.x=-10;
        if(p.y<-10)p.y=H+10; if(p.y>H+10)p.y=-10;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.283);
        ctx.fillStyle='rgba(200,150,46,'+p.a+')'; ctx.fill();
      }
      requestAnimationFrame(tick);
    })();
  }

  if(!reduced){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if(!entry.isIntersecting) return;
        var el = entry.target;
        io.unobserve(el);
        var d = parseFloat(el.dataset.d||0);
        setTimeout(function(){
          el.style.transition='opacity .75s cubic-bezier(.22,1,.36,1),transform .75s cubic-bezier(.22,1,.36,1)';
          el.style.opacity='1';
          el.style.transform='translateY(0)';
        }, d*1000 + 280);
      });
    },{rootMargin:'0px 0px 0px 0px', threshold:0.08});
    document.querySelectorAll('.rv').forEach(function(el){ io.observe(el); });
  } else {
    document.querySelectorAll('.rv').forEach(function(el){
      el.style.opacity='1'; el.style.transform='none';
    });
  }
})();

function set(id, val){

function pct(n,t){ return t ? Math.round(n/t*100)+'%' : ''; }
function bar(id,n,t){
  var el = document.getElementById(id);
  if(el) el.style.width = t ? Math.round(n/t*100)+'%' : '0%';
}
function setStatus(state,text){
  document.getElementById('dot').className='dot '+state;
  document.getElementById('status-text').textContent=text;
}
function startCountdown(){
  clearInterval(timerHandle); timer=INTERVAL;
  timerHandle=setInterval(function(){
    timer--;
    var el=document.getElementById('countdown');
    if(el) el.textContent='refreshes in '+timer+'s';
    if(timer<=0){ clearInterval(timerHandle); fetchData(); }
  },1000);
}

async function fetchData(){
  setStatus('loading','loading');
  clearInterval(timerHandle);
  var now=new Date();
  var label=now.toLocaleDateString('en-US',{timeZone:'America/New_York',weekday:'short',month:'short',day:'numeric'});
  set('today-date',label);
  try{
    var res=await fetch(API);
    if(!res.ok) throw new Error('HTTP '+res.status);
    var d=await res.json();
    var e=d.enriched, u=d.unenriched, s=d.sent_today;

    set('e-total',e.total);
    set('e-new',e.new_lead);
    set('e-fu1',e.followup_1);
    set('e-fu2',e.followup_2);
    set('e-new-pct',pct(e.new_lead,e.total));
    set('e-fu1-pct',pct(e.followup_1,e.total));
    set('e-fu2-pct',pct(e.followup_2,e.total));
    bar('bar-new',e.new_lead,e.total);
    bar('bar-fu1',e.followup_1,e.total);
    bar('bar-fu2',e.followup_2,e.total);
    set('bc-new',e.new_lead);
    set('bc-fu1',e.followup_1);
    set('bc-fu2',e.followup_2);

    set('u-total',u.total);
    set('u-ad',u.ad_leads);
    set('u-li',u.linkedin);
    set('u-gm',u.google_maps);

    set('sent-today',s.total);
    var parts=[];
    if(s.cold) parts.push('<span>'+s.cold+'</span> cold');
    if(s.fu1)  parts.push('<span>'+s.fu1+'</span> FU1');
    if(s.fu2)  parts.push('<span>'+s.fu2+'</span> FU2');
    var bd=document.getElementById('sent-breakdown');
    if(bd) bd.innerHTML=parts.length ? parts.join(' · ') : 'none yet today';

    set('updated','updated '+d.updated_at);
    setStatus('live','live');
    startCountdown();
  }catch(err){
    setStatus('error','error');
    set('updated','failed — '+err.message);
    startCountdown();
  }
}

fetchData();
</script>
</body>
</html>
