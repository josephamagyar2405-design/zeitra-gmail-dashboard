<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pipeline — zeitra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --dark:      #08080f;
  --navy:      #1A1A2E;
  --gold:      #C8962E;
  --gold-light:#E8B84E;
  --cream:     #eae4da;
  --gold-pale: rgba(200,150,46,0.09);
  --gold-border: rgba(200,150,46,0.18);
  --cream-muted: rgba(234,228,218,0.45);
  --cream-dim:   rgba(234,228,218,0.20);
  --cream-ghost: rgba(234,228,218,0.06);
  --green:     #5aad7f;
  --radius:    6px;
  --radius-lg: 10px;
}

body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* BG LAYERS */
.hero-bg {
  position: fixed;
  inset: 0;
  background: url('https://zeitra.ai/hero-bg.png') center/cover no-repeat;
  z-index: 0;
}
.hero-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(8,8,15,0.72) 0%, rgba(8,8,15,0.90) 60%, rgba(8,8,15,0.97) 100%);
  z-index: 1;
}
.noise-overlay {
  position: fixed;
  inset: 0;
  background: url('https://zeitra.ai/noise.png') repeat;
  opacity: 0.04;
  z-index: 2;
  pointer-events: none;
}
canvas.particles {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

.shell {
  position: relative;
  z-index: 10;
  max-width: 700px;
  margin: 0 auto;
  padding: 48px 24px 64px;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 0.5px solid var(--gold-border);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-area img {
  height: 26px;
  width: auto;
  opacity: 0.9;
}

.divider-v {
  width: 0.5px;
  height: 16px;
  background: var(--gold-border);
}

.page-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--cream-ghost);
  border: 0.5px solid var(--gold-border);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--cream-muted);
  backdrop-filter: blur(8px);
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--cream-dim);
  flex-shrink: 0;
  transition: background 0.3s;
}
.dot.live    { background: var(--green); box-shadow: 0 0 6px rgba(90,173,127,0.5); }
.dot.loading { background: var(--gold); animation: pulse 1s infinite; }
.dot.error   { background: #d96b5a; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* SECTION LABELS */
.section-label {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--gold-border);
}

/* CARDS */
.enriched-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}

.metric-card {
  background: rgba(8,8,15,0.6);
  border: 0.5px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 14px 16px 12px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(12px);
}

.metric-card.primary {
  background: rgba(200,150,46,0.07);
  border-color: rgba(200,150,46,0.28);
}

.metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
}

.metric-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--cream-muted);
  margin-bottom: 8px;
}

.metric-number {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 36px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: -0.01em;
  color: var(--cream);
  transition: opacity 0.2s;
}

.metric-card.primary .metric-number { font-size: 44px; color: var(--gold-light); }
.metric-number.loading { opacity: 0.15; }

.metric-pct {
  font-size: 11px;
  color: var(--cream-dim);
  margin-top: 5px;
}

/* BAR */
.bar-block {
  background: rgba(8,8,15,0.55);
  border: 0.5px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 32px;
  backdrop-filter: blur(12px);
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 11px;
}
.bar-row:last-child { margin-bottom: 0; }

.bar-label {
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--cream-muted);
  width: 90px;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 2px;
  background: var(--cream-ghost);
  border-radius: 1px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}
.bar-fill.f1 { background: var(--gold-light); }
.bar-fill.f2 { background: var(--gold); opacity: 0.75; }
.bar-fill.f3 { background: var(--gold); opacity: 0.45; }

.bar-count {
  font-size: 11px;
  color: var(--cream-dim);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* UNENRICHED */
.unenriched-block {
  background: rgba(8,8,15,0.55);
  border: 0.5px solid var(--gold-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 32px;
  backdrop-filter: blur(12px);
}

.unenriched-hero {
  padding: 20px 20px 16px;
  display: flex;
  align-items: baseline;
  gap: 12px;
  border-bottom: 0.5px solid var(--gold-border);
}

.unenriched-number {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 56px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--cream);
  transition: opacity 0.2s;
}
.unenriched-number.loading { opacity: 0.15; }

.unenriched-sublabel {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--cream-muted);
  padding-bottom: 3px;
}

.source-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}

.source-cell {
  padding: 14px 18px;
  border-right: 0.5px solid var(--gold-border);
}
.source-cell:last-child { border-right: none; }

.source-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(200,150,46,0.55);
  margin-bottom: 6px;
}

.source-number {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 28px;
  font-weight: 500;
  color: var(--cream);
  transition: opacity 0.2s;
}
.source-number.loading { opacity: 0.15; }

/* FOOTER */
footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  border-top: 0.5px solid var(--gold-border);
}

.updated {
  font-size: 11px;
  color: var(--cream-dim);
  letter-spacing: 0.03em;
}

.countdown {
  font-size: 11px;
  color: var(--cream-dim);
}

.refresh-btn {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  background: none;
  border: 0.5px solid var(--gold-border);
  border-radius: 3px;
  padding: 5px 14px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.refresh-btn:hover {
  background: var(--gold-pale);
  border-color: rgba(200,150,46,0.35);
}

@media (max-width: 520px) {
  .enriched-grid { grid-template-columns: 1fr 1fr; }
  .metric-card.primary { grid-column: 1 / -1; }
  body { padding: 0; }
  .shell { padding: 28px 16px 48px; }
}
</style>
</head>
<body>

<div class="hero-bg"></div>
<div class="hero-overlay"></div>
<div class="noise-overlay"></div>
<canvas class="particles" id="particles"></canvas>

<div class="shell">
  <header>
    <div class="logo-area">
      <img src="https://zeitra.ai/logo.png" alt="Zeitra">
      <div class="divider-v"></div>
      <span class="page-title">Pipeline</span>
    </div>
    <div class="status-pill">
      <div class="dot loading" id="dot"></div>
      <span id="status-text">loading</span>
    </div>
  </header>

  <div class="section-label">enriched leads</div>

  <div class="enriched-grid">
    <div class="metric-card primary">
      <div class="metric-label">total</div>
      <div class="metric-number loading" id="e-total">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">new lead</div>
      <div class="metric-number loading" id="e-new">—</div>
      <div class="metric-pct" id="e-new-pct"></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">follow up #1</div>
      <div class="metric-number loading" id="e-fu1">—</div>
      <div class="metric-pct" id="e-fu1-pct"></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">follow up #2</div>
      <div class="metric-number loading" id="e-fu2">—</div>
      <div class="metric-pct" id="e-fu2-pct"></div>
    </div>
  </div>

  <div class="bar-block">
    <div class="bar-row">
      <div class="bar-label">new lead</div>
      <div class="bar-track"><div class="bar-fill f1" id="bar-new" style="width:0%"></div></div>
      <div class="bar-count" id="bc-new">—</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">follow up #1</div>
      <div class="bar-track"><div class="bar-fill f2" id="bar-fu1" style="width:0%"></div></div>
      <div class="bar-count" id="bc-fu1">—</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">follow up #2</div>
      <div class="bar-track"><div class="bar-fill f3" id="bar-fu2" style="width:0%"></div></div>
      <div class="bar-count" id="bc-fu2">—</div>
    </div>
  </div>

  <div class="section-label">unenriched — staging</div>

  <div class="unenriched-block">
    <div class="unenriched-hero">
      <div class="unenriched-number loading" id="u-total">—</div>
      <div class="unenriched-sublabel">ready to enrich</div>
    </div>
    <div class="source-row">
      <div class="source-cell">
        <div class="source-label">ad leads</div>
        <div class="source-number loading" id="u-ad">—</div>
      </div>
      <div class="source-cell">
        <div class="source-label">linkedin</div>
        <div class="source-number loading" id="u-li">—</div>
      </div>
      <div class="source-cell">
        <div class="source-label">google maps</div>
        <div class="source-number loading" id="u-gm">—</div>
      </div>
    </div>
  </div>

  <footer>
    <span class="updated" id="updated">—</span>
    <span class="countdown" id="countdown"></span>
    <button class="refresh-btn" onclick="fetchData()">refresh</button>
  </footer>
</div>

<script>
// PARTICLES — exact from zeitra.ai
(function() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  let mouseX = -9999, mouseY = -9999;
  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
  document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

  const particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * (window.innerWidth || 1200),
      y: Math.random() * (window.innerHeight || 800),
      size: Math.random() * 2.5 + 1,
      speedY: -(Math.random() * 0.6 + 0.15),
      speedX: (Math.random() - 0.5) * 0.3,
      opacity: Math.random() * 0.18 + 0.06,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: Math.random() * 0.01 + 0.005,
      pushVX: 0, pushVY: 0
    });
  }

  const pushRadius = 100, pushStrength = 1.5;

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      const dx = p.x - mouseX, dy = p.y - mouseY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < pushRadius && dist > 0) {
        const force = (1 - dist/pushRadius) * pushStrength;
        p.pushVX += (dx/dist)*force;
        p.pushVY += (dy/dist)*force;
      }
      p.pushVX *= 0.92; p.pushVY *= 0.92;
      p.y += p.speedY + p.pushVY;
      p.wobble += p.wobbleSpeed;
      p.x += p.speedX + Math.sin(p.wobble)*0.3 + p.pushVX;
      if (p.y < -10) { p.y = H+10; p.x = Math.random()*W; p.pushVX=0; p.pushVY=0; }
      if (p.x < -10) p.x = W+10;
      if (p.x > W+10) p.x = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,150,46,${p.opacity})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size*2.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,150,46,${p.opacity*0.06})`;
      ctx.fill();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

// DASHBOARD DATA
const API = 'https://n8n-50yc.srv1306892.hstgr.cloud/webhook/lead-dashboard';
const INTERVAL = 60;
let timer = INTERVAL, handle;

function set(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.classList.remove('loading');
}
function pct(n, t) { return t ? Math.round(n/t*100)+'%' : ''; }
function bar(id, n, t) {
  const el = document.getElementById(id);
  if (el) el.style.width = t ? Math.round(n/t*100)+'%' : '0%';
}
function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
}
function startCountdown() {
  clearInterval(handle);
  timer = INTERVAL;
  handle = setInterval(() => {
    timer--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = 'refreshes in ' + timer + 's';
    if (timer <= 0) { clearInterval(handle); fetchData(); }
  }, 1000);
}

async function fetchData() {
  setStatus('loading', 'loading');
  clearInterval(handle);
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    const e = d.enriched, u = d.unenriched;
    set('e-total', e.total);
    set('e-new',   e.new_lead);
    set('e-fu1',   e.followup_1);
    set('e-fu2',   e.followup_2);
    set('e-new-pct',  pct(e.new_lead,   e.total));
    set('e-fu1-pct',  pct(e.followup_1, e.total));
    set('e-fu2-pct',  pct(e.followup_2, e.total));
    bar('bar-new', e.new_lead,   e.total);
    bar('bar-fu1', e.followup_1, e.total);
    bar('bar-fu2', e.followup_2, e.total);
    set('bc-new', e.new_lead);
    set('bc-fu1', e.followup_1);
    set('bc-fu2', e.followup_2);
    set('u-total', u.total);
    set('u-ad',    u.ad_leads);
    set('u-li',    u.linkedin);
    set('u-gm',    u.google_maps);
    set('updated', 'updated ' + d.updated_at);
    setStatus('live', 'live');
    startCountdown();
  } catch(err) {
    setStatus('error', 'error');
    set('updated', 'failed — ' + err.message);
    startCountdown();
  }
}

fetchData();
</script>
</body>
</html>
