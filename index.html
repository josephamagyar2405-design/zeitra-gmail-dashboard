<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pipeline — zeitra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,480;9..144,560&family=Instrument+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ZEITRA PIPELINE DASHBOARD — v2
   Matches zeitra.ai v12 design system exactly
   base #111119 · navy #1A1A2E · raised #222230 · gold #C8962E
   Type: Fraunces · Instrument Sans · Space Mono
   ============================================================ */

:root {
  --base:    #111119;
  --navy:    #1A1A2E;
  --raised:  #20202e;
  --raised-2:#272736;
  --gold:    #C8962E;
  --amber:   #E2B057;
  --bronze:  #8A6420;
  --cream:   #F3EBDA;
  --body:    #C9C2B4;
  --muted:   #948D7F;
  --green:   #5aad7f;
  --red:     #d96b5a;
  --line:          rgba(243,235,218,.09);
  --line-gold:     rgba(200,150,46,.28);
  --glow:          rgba(200,150,46,.07);
  --gold-pale:     rgba(200,150,46,.07);
  --font-display:  'Fraunces',Georgia,serif;
  --font-body:     'Instrument Sans',-apple-system,sans-serif;
  --font-mono:     'Space Mono',monospace;
  --ease:          cubic-bezier(.22,1,.36,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  background: var(--base);
  color: var(--body);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::selection { background: rgba(200,150,46,.35); color: var(--cream); }

/* ── AMBIENT LAYER ─────────────────────────────────────────── */
.ambient {
  position: fixed; inset: 0; z-index: -3;
  background:
    radial-gradient(1100px 700px at 78% -8%, rgba(200,150,46,.08), transparent 62%),
    radial-gradient(900px 640px at 8% 38%, rgba(43,49,92,.5), transparent 65%),
    radial-gradient(1000px 760px at 92% 78%, rgba(138,100,32,.07), transparent 60%),
    radial-gradient(760px 560px at 22% 102%, rgba(34,38,68,.55), transparent 65%),
    linear-gradient(180deg,#13131d 0%, #111119 38%, #12121c 70%, #10101a 100%);
}
#dust { position: fixed; inset: 0; z-index: -2; pointer-events: none; opacity: .5; }

/* ── CIRCUIT TRACES ────────────────────────────────────────── */
.circuit {
  position: fixed; inset: 0; z-index: -2;
  pointer-events: none; opacity: .06;
  width: 100%; height: 100%;
}
.circuit .pl {
  stroke: var(--amber); stroke-width: 1.4; stroke-opacity: .55;
  stroke-dasharray: 80 2400; stroke-dashoffset: 2480;
  animation: pulseTravel var(--dur,10s) linear var(--del,0s) infinite;
  filter: drop-shadow(0 0 6px rgba(226,176,87,.8));
}
@keyframes pulseTravel { to { stroke-dashoffset: 0; } }

.circuit-nodes {
  position: fixed; inset: 0; z-index: -2;
  pointer-events: none; width: 100%; height: 100%;
}
.circuit-nodes .cnode {
  fill: rgba(200,150,46,.6); opacity: 0;
  transform-box: fill-box; transform-origin: center;
  filter: drop-shadow(0 0 5px rgba(226,176,87,.7));
  animation: nodeBreath 4.5s ease-in-out var(--cdel,0s) infinite;
  animation-fill-mode: both;
}
@keyframes nodeBreath {
  0%,100% { opacity:0; transform:scale(.55); }
  12%     { opacity:.08; transform:scale(.9); }
  22%     { opacity:.15; transform:scale(1.35); }
  42%,99% { opacity:0; transform:scale(.55); }
}

/* ── PAGE VEIL ─────────────────────────────────────────────── */
.veil {
  position: fixed; inset: 0; z-index: 200; pointer-events: none;
  background: linear-gradient(120deg,#14141f,#1A1A2E);
  transform: translateY(0);
  animation: veilOut .62s var(--ease) .12s forwards;
}
.veil::before {
  content: ''; position: absolute; top:-2px; left:0; right:0; height:2px;
  background: linear-gradient(90deg,transparent,var(--gold),transparent);
  filter: drop-shadow(0 0 8px rgba(200,150,46,.6));
}
@keyframes veilOut { from{transform:translateY(0)} to{transform:translateY(-101%)} }

/* ── SHELL ─────────────────────────────────────────────────── */
.shell {
  max-width: 740px;
  margin: 0 auto;
  padding: 52px 24px 72px;
}

/* ── HEADER ────────────────────────────────────────────────── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 48px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--line);
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-area img {
  height: 30px;
  width: auto;
  opacity: .92;
}

.divider-v {
  width: 1px;
  height: 20px;
  background: var(--line-gold);
}

.page-title {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--gold);
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--gold-pale);
  border: 1px solid var(--line-gold);
  border-radius: 100px;
  padding: 6px 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  transition: border-color .3s;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background .3s;
}
.dot.live    { background: var(--green); box-shadow: 0 0 8px rgba(90,173,127,.6); }
.dot.loading { background: var(--amber); animation: blink 1s ease-in-out infinite; }
.dot.error   { background: var(--red); box-shadow: 0 0 6px rgba(217,107,90,.5); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── SECTION LABELS ────────────────────────────────────────── */
.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.section-label::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--gold);
  flex: none;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line-gold);
}

/* ── SENT TODAY BANNER ─────────────────────────────────────── */
.sent-today-block {
  background: linear-gradient(160deg, rgba(200,150,46,.12), rgba(26,26,46,.6));
  border: 1px solid var(--line-gold);
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  position: relative;
  overflow: hidden;
}
.sent-today-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,150,46,.5), transparent);
}

.sent-today-left {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.sent-today-number {
  font-family: var(--font-display);
  font-size: 52px;
  font-weight: 480;
  line-height: 1;
  letter-spacing: -.02em;
  color: var(--gold);
  font-variation-settings: "opsz" 72;
  transition: opacity .2s;
}
.sent-today-number.loading { opacity: .15; }

.sent-today-meta {
  padding-bottom: 4px;
}
.sent-today-meta b {
  display: block;
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 480;
  color: var(--cream);
  line-height: 1.2;
  font-variation-settings: "opsz" 72;
}
.sent-today-meta span {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--muted);
}

.sent-today-right {
  text-align: right;
}
.sent-today-date {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--bronze);
  display: block;
  margin-bottom: 4px;
}
.sent-today-breakdown {
  font-size: 12px;
  color: var(--muted);
}
.sent-today-breakdown span {
  color: var(--amber);
}

/* ── ENRICHED METRICS ──────────────────────────────────────── */
.enriched-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.metric-card {
  background: linear-gradient(160deg,rgba(39,39,54,.6),rgba(26,26,46,.45));
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px 20px 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .3s var(--ease), transform .3s var(--ease);
}
.metric-card:hover {
  border-color: var(--line-gold);
  transform: translateY(-2px);
}
.metric-card.primary {
  background: linear-gradient(160deg, rgba(200,150,46,.13), rgba(26,26,46,.55));
  border-color: rgba(200,150,46,.3);
}
.metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line-gold), transparent);
}
.metric-card.primary::before {
  background: linear-gradient(90deg, transparent, rgba(200,150,46,.5), transparent);
}

.metric-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

.metric-number {
  font-family: var(--font-display);
  font-size: 38px;
  font-weight: 480;
  line-height: 1;
  letter-spacing: -.02em;
  color: var(--cream);
  font-variation-settings: "opsz" 72;
  transition: opacity .2s;
}
.metric-card.primary .metric-number {
  font-size: 48px;
  color: var(--gold);
}
.metric-number.loading { opacity: .15; }

.metric-pct {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: .06em;
}

/* ── BAR CHART ─────────────────────────────────────────────── */
.bar-block {
  background: linear-gradient(160deg,rgba(39,39,54,.55),rgba(26,26,46,.4));
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 40px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 13px;
}
.bar-row:last-child { margin-bottom: 0; }

.bar-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  width: 88px;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 2px;
  background: rgba(243,235,218,.06);
  border-radius: 1px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width .8s cubic-bezier(.22,1,.36,1);
}
.bar-fill.f1 { background: linear-gradient(90deg, var(--bronze), var(--gold)); }
.bar-fill.f2 { background: linear-gradient(90deg, var(--bronze), var(--gold)); opacity: .65; }
.bar-fill.f3 { background: linear-gradient(90deg, var(--bronze), var(--gold)); opacity: .35; }

.bar-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* ── UNENRICHED ────────────────────────────────────────────── */
.unenriched-block {
  background: linear-gradient(160deg,rgba(39,39,54,.6),rgba(26,26,46,.45));
  border: 1px solid var(--line);
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 40px;
  transition: border-color .3s var(--ease);
}
.unenriched-block:hover { border-color: var(--line-gold); }

.unenriched-hero {
  padding: 24px 24px 18px;
  display: flex;
  align-items: baseline;
  gap: 14px;
  border-bottom: 1px solid var(--line);
  position: relative;
}
.unenriched-hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line-gold), transparent);
}

.unenriched-number {
  font-family: var(--font-display);
  font-size: 62px;
  font-weight: 480;
  letter-spacing: -.02em;
  line-height: 1;
  color: var(--cream);
  font-variation-settings: "opsz" 72;
  transition: opacity .2s;
}
.unenriched-number.loading { opacity: .15; }

.unenriched-sublabel {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 4px;
}

.source-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}

.source-cell {
  padding: 18px 22px;
  border-right: 1px solid var(--line);
  transition: background .25s;
}
.source-cell:hover { background: var(--gold-pale); }
.source-cell:last-child { border-right: none; }

.source-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--bronze);
  margin-bottom: 8px;
}

.source-number {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 480;
  color: var(--cream);
  font-variation-settings: "opsz" 72;
  transition: opacity .2s;
}
.source-number.loading { opacity: .15; }

/* ── FOOTER ────────────────────────────────────────────────── */
footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  padding-top: 22px;
  border-top: 1px solid var(--line);
}

.updated {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  color: var(--muted);
}

.countdown {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  color: var(--muted);
  opacity: .6;
}

.refresh-btn {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  background: rgba(200,150,46,.06);
  border: 1px solid var(--line-gold);
  border-radius: 100px;
  padding: 7px 18px;
  cursor: pointer;
  transition: background .2s var(--ease), border-color .2s var(--ease), transform .2s var(--ease);
  position: relative;
  overflow: hidden;
}
.refresh-btn::after {
  content: '';
  position: absolute;
  top: 0; left: -70%; width: 45%; height: 100%;
  background: linear-gradient(100deg, transparent, rgba(200,150,46,.25), transparent);
  transform: skewX(-20deg);
  transition: left .55s ease;
}
.refresh-btn:hover {
  background: rgba(200,150,46,.13);
  border-color: rgba(200,150,46,.5);
  transform: translateY(-1px);
}
.refresh-btn:hover::after { left: 130%; }

/* ── RESPONSIVE ────────────────────────────────────────────── */
@media (max-width: 580px) {
  .enriched-grid { grid-template-columns: 1fr 1fr; }
  .metric-card.primary { grid-column: 1 / -1; }
  .shell { padding: 32px 16px 56px; }
  .sent-today-block { flex-direction: column; gap: 14px; }
  .sent-today-right { text-align: left; }
  footer { flex-direction: column; align-items: flex-start; gap: 10px; }
}

/* ── REVEAL ANIMATION ──────────────────────────────────────── */
.rv { opacity: 0; transform: translateY(22px); }
.no-js .rv { opacity: 1; transform: none; }

@media (prefers-reduced-motion: reduce) {
  .veil { display: none !important; }
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
  .rv { opacity: 1 !important; transform: none !important; }
}
</style>
</head>
<body>

<div class="veil" aria-hidden="true"></div>
<div class="ambient"></div>
<canvas id="dust"></canvas>

<!-- Circuit traces (matches main site exactly) -->
<svg class="circuit" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs><pattern id="trace" width="320" height="320" patternUnits="userSpaceOnUse">
    <path d="M20 40h120v80h90M60 300V180h150M260 20v110h-70" fill="none" stroke="#C8962E" stroke-width="1"/>
    <circle cx="140" cy="40" r="2.5" fill="#C8962E"/>
    <circle cx="230" cy="120" r="2.5" fill="#C8962E"/>
    <circle cx="60"  cy="300" r="2.5" fill="#C8962E"/>
    <circle cx="190" cy="130" r="2.5" fill="#C8962E"/>
  </pattern></defs>
  <rect width="100%" height="100%" fill="url(#trace)"/>
  <g class="pulses" fill="none" stroke-linecap="round">
    <path class="pl" style="--dur:9s;--del:0s"    d="M-60 140 H420 V360 H840 V230 H1500"/>
    <path class="pl" style="--dur:12s;--del:2.5s" d="M-60 760 H300 V520 H780 V680 H1500"/>
    <path class="pl" style="--dur:10s;--del:5s"   d="M240 960 V610 H580 V390 H1120 V540 H1500"/>
    <path class="pl" style="--dur:13s;--del:1.2s" d="M-60 440 H190 V100 H660 V250 H1500"/>
    <path class="pl" style="--dur:11s;--del:6.8s" d="M1500 820 H1040 V600 H560 V850 H-60"/>
    <path class="pl" style="--dur:14s;--del:3.8s" d="M900 -60 V180 H1260 V470 H1500"/>
  </g>
</svg>

<svg class="circuit-nodes" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <circle class="cnode" cx="420"  cy="360" r="3" style="--cdel:0s"/>
  <circle class="cnode" cx="840"  cy="230" r="3" style="--cdel:.55s"/>
  <circle class="cnode" cx="780"  cy="520" r="3" style="--cdel:1.1s"/>
  <circle class="cnode" cx="1120" cy="390" r="3" style="--cdel:1.6s"/>
  <circle class="cnode" cx="660"  cy="100" r="3" style="--cdel:2.1s"/>
  <circle class="cnode" cx="560"  cy="600" r="3" style="--cdel:2.6s"/>
  <circle class="cnode" cx="1260" cy="470" r="3" style="--cdel:3.1s"/>
</svg>

<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="logo-area">
      <img src="https://zeitra.ai/logo.png" alt="Zeitra">
      <div class="divider-v"></div>
      <span class="page-title">Pipeline</span>
    </div>
    <div class="status-pill">
      <div class="dot loading" id="dot"></div>
      <span id="status-text">loading</span>
    </div>
  </header>

  <!-- SENT TODAY -->
  <div class="section-label rv">outreach</div>
  <div class="sent-today-block rv" data-d=".04">
    <div class="sent-today-left">
      <div class="sent-today-number loading" id="sent-today">—</div>
      <div class="sent-today-meta">
        <b>sent today</b>
        <span id="today-label">EST — loading</span>
      </div>
    </div>
    <div class="sent-today-right">
      <span class="sent-today-date" id="today-date">—</span>
      <div class="sent-today-breakdown" id="sent-breakdown">—</div>
    </div>
  </div>

  <!-- ENRICHED LEADS -->
  <div class="section-label rv" data-d=".08">enriched leads</div>

  <div class="enriched-grid rv" data-d=".10">
    <div class="metric-card primary">
      <div class="metric-label">total</div>
      <div class="metric-number loading" id="e-total">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">new lead</div>
      <div class="metric-number loading" id="e-new">—</div>
      <div class="metric-pct" id="e-new-pct"></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">follow up #1</div>
      <div class="metric-number loading" id="e-fu1">—</div>
      <div class="metric-pct" id="e-fu1-pct"></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">follow up #2</div>
      <div class="metric-number loading" id="e-fu2">—</div>
      <div class="metric-pct" id="e-fu2-pct"></div>
    </div>
  </div>

  <div class="bar-block rv" data-d=".13">
    <div class="bar-row">
      <div class="bar-label">new lead</div>
      <div class="bar-track"><div class="bar-fill f1" id="bar-new" style="width:0%"></div></div>
      <div class="bar-count" id="bc-new">—</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">follow up #1</div>
      <div class="bar-track"><div class="bar-fill f2" id="bar-fu1" style="width:0%"></div></div>
      <div class="bar-count" id="bc-fu1">—</div>
    </div>
    <div class="bar-row">
      <div class="bar-label">follow up #2</div>
      <div class="bar-track"><div class="bar-fill f3" id="bar-fu2" style="width:0%"></div></div>
      <div class="bar-count" id="bc-fu2">—</div>
    </div>
  </div>

  <!-- UNENRICHED STAGING -->
  <div class="section-label rv" data-d=".16">unenriched — staging</div>

  <div class="unenriched-block rv" data-d=".18">
    <div class="unenriched-hero">
      <div class="unenriched-number loading" id="u-total">—</div>
      <div class="unenriched-sublabel">ready to enrich</div>
    </div>
    <div class="source-row">
      <div class="source-cell">
        <div class="source-label">ad leads</div>
        <div class="source-number loading" id="u-ad">—</div>
      </div>
      <div class="source-cell">
        <div class="source-label">linkedin</div>
        <div class="source-number loading" id="u-li">—</div>
      </div>
      <div class="source-cell">
        <div class="source-label">google maps</div>
        <div class="source-number loading" id="u-gm">—</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="rv" data-d=".22">
    <span class="updated" id="updated">—</span>
    <span class="countdown" id="countdown"></span>
    <button class="refresh-btn" onclick="fetchData()">refresh</button>
  </footer>

</div>

<script>
/* ── CONFIG ─────────────────────────────────────────────────── */
const API      = 'https://n8n-50yc.srv1306892.hstgr.cloud/webhook/lead-dashboard';
const INTERVAL = 60;
let timer = INTERVAL, timerHandle;

/* ── HELPERS ─────────────────────────────────────────────────── */
function set(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.classList.remove('loading');
}

function pct(n, t) {
  return t ? Math.round(n / t * 100) + '%' : '';
}

function bar(id, n, t) {
  const el = document.getElementById(id);
  if (el) el.style.width = t ? Math.round(n / t * 100) + '%' : '0%';
}

function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function todayInEST() {
  // Returns an object with {y, m, d, label, isoDate}
  const now = new Date();
  const estStr = now.toLocaleDateString('en-US', {
    timeZone: 'America/New_York',
    year: 'numeric', month: '2-digit', day: '2-digit'
  });
  // estStr = "MM/DD/YYYY"
  const [m, d, y] = estStr.split('/');
  const isoDate = `${y}-${m}-${d}`; // YYYY-MM-DD
  const label = now.toLocaleDateString('en-US', {
    timeZone: 'America/New_York',
    weekday: 'short', month: 'short', day: 'numeric'
  });
  return { y, m, d, label, isoDate };
}

function countSentToday(rows, today) {
  // rows: array of lead objects with a "Last Sent" or similar field
  // We look for any date-like field containing today's date in EST
  if (!rows || !rows.length) return { total: 0, new: 0, fu1: 0, fu2: 0 };

  let total = 0, newCount = 0, fu1Count = 0, fu2Count = 0;

  for (const row of rows) {
    // Check all fields for today's EST date
    // The "Last Sent" field typically contains a date string
    const lastSent = row['Last Sent'] || row['last_sent'] || row['lastSent'] || '';
    if (!lastSent) continue;

    // Normalize: check if the date string contains today's date
    // Handles formats like "2026-06-11", "06/11/2026", "Jun 11, 2026", etc.
    const sentStr = String(lastSent);
    const isToday = (
      sentStr.includes(today.isoDate) ||                          // YYYY-MM-DD
      sentStr.includes(`${today.m}/${today.d}/${today.y}`) ||     // MM/DD/YYYY
      sentStr.startsWith(today.isoDate)
    );

    if (isToday) {
      total++;
      const status = (row['Status'] || row['status'] || '').toLowerCase();
      if (status.includes('follow up #2') || status.includes('followup_2') || status === 'follow up #2') {
        fu2Count++;
      } else if (status.includes('follow up #1') || status.includes('followup_1') || status === 'follow up #1') {
        fu1Count++;
      } else {
        newCount++;
      }
    }
  }
  return { total, new: newCount, fu1: fu1Count, fu2: fu2Count };
}

function startCountdown() {
  clearInterval(timerHandle);
  timer = INTERVAL;
  timerHandle = setInterval(() => {
    timer--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = 'refreshes in ' + timer + 's';
    if (timer <= 0) { clearInterval(timerHandle); fetchData(); }
  }, 1000);
}

/* ── FETCH ───────────────────────────────────────────────────── */
async function fetchData() {
  setStatus('loading', 'loading');
  clearInterval(timerHandle);

  const today = todayInEST();

  // Update the date display immediately
  set('today-date', today.label);
  set('today-label', 'EST');

  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();

    const e = d.enriched;
    const u = d.unenriched;

    /* — enriched metrics — */
    set('e-total', e.total);
    set('e-new',   e.new_lead);
    set('e-fu1',   e.followup_1);
    set('e-fu2',   e.followup_2);
    set('e-new-pct',  pct(e.new_lead,   e.total));
    set('e-fu1-pct',  pct(e.followup_1, e.total));
    set('e-fu2-pct',  pct(e.followup_2, e.total));

    bar('bar-new', e.new_lead,   e.total);
    bar('bar-fu1', e.followup_1, e.total);
    bar('bar-fu2', e.followup_2, e.total);

    set('bc-new', e.new_lead);
    set('bc-fu1', e.followup_1);
    set('bc-fu2', e.followup_2);

    /* — unenriched — */
    set('u-total', u.total);
    set('u-ad',    u.ad_leads);
    set('u-li',    u.linkedin);
    set('u-gm',    u.google_maps);

    /* — sent today — */
    // d.rows should contain the raw enriched lead rows with Last Sent field
    // If the webhook returns raw rows, compute client-side
    const rawRows = d.rows || d.enriched_rows || [];
    const sent = countSentToday(rawRows, today);

    // Fallback: if webhook returns pre-computed sent_today, use that
    if (d.sent_today !== undefined) {
      set('sent-today', d.sent_today.total || d.sent_today);
      const st = d.sent_today;
      if (typeof st === 'object') {
        const parts = [];
        if (st.new_lead)    parts.push('<span>' + st.new_lead   + '</span> cold');
        if (st.followup_1)  parts.push('<span>' + st.followup_1 + '</span> FU1');
        if (st.followup_2)  parts.push('<span>' + st.followup_2 + '</span> FU2');
        const breakdownEl = document.getElementById('sent-breakdown');
        if (breakdownEl) breakdownEl.innerHTML = parts.length ? parts.join(' · ') : 'no breakdown';
      }
    } else if (rawRows.length) {
      set('sent-today', sent.total);
      const breakdownEl = document.getElementById('sent-breakdown');
      if (breakdownEl) {
        const parts = [];
        if (sent.new) parts.push('<span>' + sent.new  + '</span> cold');
        if (sent.fu1) parts.push('<span>' + sent.fu1  + '</span> FU1');
        if (sent.fu2) parts.push('<span>' + sent.fu2  + '</span> FU2');
        breakdownEl.innerHTML = parts.length ? parts.join(' · ') : 'none yet today';
      }
    } else {
      // No row data — show 0 with a note
      set('sent-today', '—');
      const breakdownEl = document.getElementById('sent-breakdown');
      if (breakdownEl) breakdownEl.innerHTML = 'row data not in response';
    }

    set('updated', 'updated ' + d.updated_at);
    setStatus('live', 'live');
    startCountdown();

  } catch (err) {
    setStatus('error', 'error');
    const updEl = document.getElementById('updated');
    if (updEl) { updEl.textContent = 'failed — ' + err.message; }
    startCountdown();
  }
}

/* ── DUST CANVAS (matches main site) ─────────────────────────── */
(function () {
  var canvas = document.getElementById('dust');
  if (!canvas) return;
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) return;

  var ctx = canvas.getContext('2d'), pts = [], W, H;

  function size() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  size();
  addEventListener('resize', size);

  var N = innerWidth < 700 ? 20 : 38;
  for (var i = 0; i < N; i++) {
    pts.push({
      x:  Math.random() * innerWidth,
      y:  Math.random() * innerHeight,
      vx: (Math.random() - .5) * .12,
      vy: (Math.random() - .5) * .12,
      r:  Math.random() * 1.4 + .4,
      a:  Math.random() * .055 + .02
    });
  }

  (function tick() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.283);
      ctx.fillStyle = 'rgba(200,150,46,' + p.a + ')';
      ctx.fill();
    }
    requestAnimationFrame(tick);
  })();
})();

/* ── SCROLL REVEALS ──────────────────────────────────────────── */
(function () {
  document.documentElement.classList.remove('no-js');
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduced) return;

  // Staggered entrance on load
  var els = document.querySelectorAll('.rv');
  els.forEach(function (el) {
    var d = parseFloat(el.dataset.d || 0);
    setTimeout(function () {
      el.style.transition = 'opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1)';
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    }, (d + .28) * 1000);
  });
})();

/* ── BOOT ────────────────────────────────────────────────────── */
fetchData();
</script>
</body>
</html>
